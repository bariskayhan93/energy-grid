<h1 class="title">Netzanalyse</h1>

<div class="meta">
  <span>MV_LV Düsseldorf-Altstadt</span>
  <b class="badge">15 Min</b>
  <span>14.07.2025</span>
</div>

@if (gridState.statusSummary$ | async; as summary) {
  <div class="counts">
    @for (s of statuses; track s) {
      @if (summary[s] > 0) {
        <span class="pill" [style.background]="colors[s]">{{ labels[s] }}: {{ summary[s] }}</span>
      }
    }
  </div>
}
